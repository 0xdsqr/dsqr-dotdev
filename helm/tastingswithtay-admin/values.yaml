replicaCount: 1

image:
  repository: ghcr.io/0xdsqr/tastingswithtay-admin
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-creds

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: http
  containerPort: 3011

env:
  BASE_URL: https://admin.tastingswithtay.com
  BETTER_AUTH_URL: https://admin.tastingswithtay.com
  CDN_BASE: https://cdn.dsqr.dev
  DISCORD_CLIENT_ID: "1465977766485688370"
  S3_BUCKET: dsqr-dotdev
  S3_ENDPOINT: s3.dsqr.dev
  S3_FORCE_PATH_STYLE: "true"
  S3_REGION: us-east-1
  S3_USE_SSL: "true"
  TRUSTED_ORIGINS: https://admin.tastingswithtay.com,https://tastingswithtay.com
  OTEL_SERVICE_NAME: twt-admin
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,k8s.namespace.name=twt

existingSecret: twt-secrets

resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 2Gi

startupProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  failureThreshold: 24

readinessProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  failureThreshold: 3

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: admin.tastingswithtay.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
