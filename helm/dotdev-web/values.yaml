replicaCount: 1

image:
  repository: ghcr.io/0xdsqr/dotdev-web
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-creds

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: http
  containerPort: 3020

env:
  BASE_URL: https://dsqr.dev
  TRUSTED_ORIGINS: https://dsqr.dev

existingSecret: dotdev-web-secrets

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

startupProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  failureThreshold: 24

readinessProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  failureThreshold: 3

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: dsqr.dev
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
