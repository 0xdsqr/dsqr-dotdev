replicaCount: 1

image:
  repository: ghcr.io/0xdsqr/dotdev-web
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-creds

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: http
  containerPort: 3020

env:
  BASE_URL: https://dsqr.dev
  TRUSTED_ORIGINS: https://dsqr.dev
  S3_BUCKET: dsqr-dotdev
  S3_ENDPOINT: s3.dsqr.dev
  S3_USE_SSL: "true"
  S3_FORCE_PATH_STYLE: "true"
  S3_REGION: us-east-1
  OTEL_SERVICE_NAME: dotdev-web
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=dev,k8s.namespace.name=dsqr

existingSecret: dotdev-web-secrets

networkPolicy:
  enabled: true
  ingress:
    # Empty `from` means "allow any source to the service port".
    # Prod values should narrow this to Traefik plus trusted same-namespace apps.
    from: []
  egress:
    allowAll: true
    dns:
      enabled: true
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
    extra: []

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

startupProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  failureThreshold: 24

readinessProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  failureThreshold: 3

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: dsqr.dev
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
