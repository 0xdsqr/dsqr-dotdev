replicaCount: 1

image:
  repository: ghcr.io/0xdsqr/dotdev-studio
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-creds

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: http
  containerPort: 3021

env:
  BASE_URL: https://studio.dsqr.dev
  TRUSTED_ORIGINS: https://studio.dsqr.dev,https://dsqr.dev
  S3_BUCKET: dsqr-dotdev
  S3_ENDPOINT: s3.dsqr.dev
  S3_USE_SSL: "true"
  S3_FORCE_PATH_STYLE: "true"
  S3_REGION: us-east-1

existingSecret: dotdev-studio-secrets

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

startupProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  failureThreshold: 24

readinessProbe:
  tcpSocket:
    port: http
  periodSeconds: 5
  failureThreshold: 3

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: studio.dsqr.dev
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
