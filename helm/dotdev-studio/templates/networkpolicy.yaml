{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dotdev-studio.fullname" . }}
  labels:
    {{- include "dotdev-studio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "dotdev-studio.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if not .Values.networkPolicy.egress.allowAll }}
    - Egress
    {{- end }}
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.containerPort }}
      {{- with .Values.networkPolicy.ingress.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if not .Values.networkPolicy.egress.allowAll }}
  egress:
    {{- if .Values.networkPolicy.egress.dns.enabled }}
    - to:
        {{- toYaml .Values.networkPolicy.egress.dns.to | nindent 8 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- with .Values.networkPolicy.egress.extra }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
