# Production Helm values for dotdev-studio.
# Keep deployment pins and cluster-only overrides in gitops/values/dotdev-studio/<cluster>.yaml.
fullnameOverride: dotdev-studio
image:
  repository: ghcr.io/0xdsqr/dotdev-studio
  version: ""
  tag: ""
  digest: ""
  requireDigest: true
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-creds
env:
  AUTH_TRUSTED_PROXIES: 10.0.0.0/16
  BASE_URL: https://studio.dsqr.dev
  TRUSTED_ORIGINS: https://studio.dsqr.dev
  S3_BUCKET: dsqr-dotdev
  S3_ENDPOINT: s3.dsqr.dev
  S3_USE_SSL: "true"
  S3_FORCE_PATH_STYLE: "true"
  S3_REGION: us-east-1
  OTEL_SERVICE_NAME: dotdev-studio
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,k8s.namespace.name=dsqr
existingSecret: dotdev-studio-secrets
networkPolicy:
  enabled: true
  ingress:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: traefik
  egress:
    allowAll: false
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: studio.dsqr.dev
      paths:
        - path: /
          pathType: Prefix
resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 2Gi
