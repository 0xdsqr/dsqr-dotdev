# Production Helm values for dotdev-labs.
# Keep deployment pins and cluster-only overrides in gitops/values/dotdev-labs/<cluster>.yaml.
fullnameOverride: dotdev-labs
image:
  repository: ghcr.io/0xdsqr/dotdev-labs
  version: ""
  tag: ""
  digest: ""
  requireDigest: true
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: ghcr-creds
env:
  BASE_URL: https://labs.dsqr.dev
  TRUSTED_ORIGINS: https://labs.dsqr.dev
  OTEL_SERVICE_NAME: dotdev-labs
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,k8s.namespace.name=dsqr
networkPolicy:
  enabled: true
  ingress:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: traefik
  egress:
    allowAll: false
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: labs.dsqr.dev
      paths:
        - path: /
          pathType: Prefix
resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 2Gi
