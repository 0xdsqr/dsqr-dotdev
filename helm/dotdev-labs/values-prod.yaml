fullnameOverride: dotdev-labs
image:
  repository: ghcr.io/0xdsqr/dotdev-labs
  tag: sha-a43cd9ea438a84ab38ed589be114f0643ebc20a1
  pullPolicy: Always
imagePullSecrets:
  - name: ghcr-creds
env:
  BASE_URL: https://labs.dsqr.dev
  TRUSTED_ORIGINS: https://labs.dsqr.dev,https://dsqr.dev
  OTEL_SERVICE_NAME: dotdev-labs
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,k8s.namespace.name=dsqr
existingSecret: dotdev-web-secrets
ingress:
  enabled: true
  className: traefik
  hosts:
    - host: labs.dsqr.dev
      paths:
        - path: /
          pathType: Prefix
resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 2Gi
