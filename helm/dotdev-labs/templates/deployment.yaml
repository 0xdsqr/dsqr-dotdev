apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dotdev-labs.fullname" . }}
  labels:
    {{- include "dotdev-labs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dotdev-labs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dotdev-labs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ default .Chart.AppVersion .Values.image.version | quote }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "dotdev-labs.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "dotdev-labs.name" . }}
          image: {{ include "dotdev-labs.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
          {{- if .Values.additionalTrustedCa.enabled }}
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: {{ .Values.additionalTrustedCa.mountPath | quote }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "dotdev-labs.fullname" . }}-config
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.tmpDir.enabled .Values.additionalTrustedCa.enabled }}
          volumeMounts:
            {{- if .Values.tmpDir.enabled }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- if .Values.additionalTrustedCa.enabled }}
            - name: additional-trusted-ca
              mountPath: {{ .Values.additionalTrustedCa.mountPath | quote }}
              subPath: {{ .Values.additionalTrustedCa.key | quote }}
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.tmpDir.enabled .Values.additionalTrustedCa.enabled }}
      volumes:
        {{- if .Values.tmpDir.enabled }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpDir.sizeLimit | quote }}
        {{- end }}
        {{- if .Values.additionalTrustedCa.enabled }}
        - name: additional-trusted-ca
          configMap:
            name: {{ required "additionalTrustedCa.configMapName is required when additionalTrustedCa.enabled is true" .Values.additionalTrustedCa.configMapName }}
            defaultMode: 0444
            items:
              - key: {{ .Values.additionalTrustedCa.key | quote }}
                path: {{ .Values.additionalTrustedCa.key | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
