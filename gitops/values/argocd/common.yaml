# Shared default Helm values for the Argo CD chart.
# Keep values here when every cluster should use the same Argo CD defaults.
# Put cluster-specific changes in gitops/values/argocd/<cluster>.yaml.
configs:
  cm:
    timeout.reconciliation: 120s
    timeout.reconciliation.jitter: 60s
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Progressing"
      hs.message = "Waiting for child Application health"
      if obj.status ~= nil and obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
      return hs
  params:
    server.insecure: "true"

crds:
  install: true
  keep: true

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    path: /
    pathType: Prefix
    tls: false
