# hub-a Helm value overrides for twt-admin.
# Use this for cluster-specific external chart values that should layer on top of Tastings with Tay's own values-prod.yaml.
# Leave empty when hub-a uses the external chart values unchanged.
existingSecret: twt-admin-secrets

env:
  DATABASE_SSL: require
  DATABASE_SSL_REJECT_UNAUTHORIZED: "true"

additionalTrustedCa:
  enabled: true
  configMapName: dsqr-home-root-ca
