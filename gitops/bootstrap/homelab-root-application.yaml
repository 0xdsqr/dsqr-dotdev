apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: dsqr-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
    targetRevision: master
    path: gitops/clusters/homelab
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
