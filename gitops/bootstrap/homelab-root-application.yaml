apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab
  namespace: argocd
  labels:
    app.kubernetes.io/name: homelab
    app.kubernetes.io/part-of: dsqr-gitops
    homelab.dev/tier: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
    targetRevision: codex/homelab-migration
    path: gitops/clusters/homelab
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 5
      refresh: true
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
