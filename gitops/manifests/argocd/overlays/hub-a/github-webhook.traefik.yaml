apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-github-webhook-rate-limit
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: argocd-github-webhook
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: argocd
    homelab.dev/cluster: hub-a
    homelab.dev/owner: platform
    homelab.dev/tier: platform-ingress
spec:
  rateLimit:
    average: 60
    burst: 20
    period: 1m
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-github-webhook
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: argocd-github-webhook
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: argocd
    homelab.dev/cluster: hub-a
    homelab.dev/owner: platform
    homelab.dev/tier: platform-ingress
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd-hooks.hub-a.dsqr.dev`) && Path(`/api/webhook`) && Method(`POST`)
      priority: 100
      middlewares:
        - name: argocd-github-webhook-rate-limit
      services:
        - name: argocd-server
          port: 80
  tls: {}
