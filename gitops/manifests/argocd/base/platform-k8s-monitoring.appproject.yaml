apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-k8s-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: platform-k8s-monitoring
    app.kubernetes.io/part-of: dsqr-gitops
    homelab.dev/tier: platform
spec:
  description: Kubernetes telemetry collection
  sourceRepos:
    - https://grafana.github.io/helm-charts
    - https://github.com/0xdsqr/dsqr-dotdev.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: observability
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: alloys.collectors.grafana.com
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: k8s-monitoring-alloy-operator
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: k8s-monitoring-alloy-operator-alloy-manager
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: k8s-monitoring-kube-state-metrics
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: k8s-monitoring-alloy-operator
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: k8s-monitoring-alloy-operator-alloy-manager
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: k8s-monitoring-kube-state-metrics
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: DaemonSet
    - group: apps
      kind: Deployment
    - group: batch
      kind: Job
    - group: collectors.grafana.com
      kind: Alloy
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
