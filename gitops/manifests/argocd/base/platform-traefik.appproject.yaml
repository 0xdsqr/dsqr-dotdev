apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: platform-traefik
    app.kubernetes.io/part-of: dsqr-gitops
    homelab.dev/tier: platform
spec:
  description: Traefik cluster ingress
  sourceRepos:
    - https://traefik.github.io/charts
    - https://github.com/0xdsqr/dsqr-dotdev.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: traefik
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: accesscontrolpolicies.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: aiservices.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apiauths.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apibundles.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apicatalogitems.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apiplans.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apiportalauths.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apiportals.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apiratelimits.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apis.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: apiversions.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: backendtlspolicies.gateway.networking.k8s.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: gatewayclasses.gateway.networking.k8s.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: gateways.gateway.networking.k8s.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: grpcroutes.gateway.networking.k8s.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: httproutes.gateway.networking.k8s.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: ingressroutes.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: ingressroutetcps.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: ingressrouteudps.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: managedapplications.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: managedsubscriptions.hub.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: middlewares.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: middlewaretcps.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: referencegrants.gateway.networking.k8s.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: serverstransports.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: serverstransporttcps.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: tlsoptions.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: tlsstores.traefik.io
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: traefikservices.traefik.io
    - group: networking.k8s.io
      kind: IngressClass
      name: traefik
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: traefik-traefik
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: traefik-traefik
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: traefik.io
      kind: TLSStore
