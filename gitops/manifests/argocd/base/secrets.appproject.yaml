apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: secrets
    app.kubernetes.io/part-of: dsqr-gitops
    homelab.dev/tier: platform
spec:
  description: Trusted hub-a Vault-backed secret declarations
  sourceRepos:
    - https://github.com/0xdsqr/dsqr-dotdev.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: dsqr
    - server: https://kubernetes.default.svc
      namespace: fidara
    - server: https://kubernetes.default.svc
      namespace: twt
    - server: https://kubernetes.default.svc
      namespace: traefik
  clusterResourceWhitelist:
    - group: external-secrets.io
      kind: ClusterExternalSecret
      name: ghcr-creds
    - group: external-secrets.io
      kind: ClusterSecretStore
      name: vault-hub-a
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: external-secrets.io
      kind: ExternalSecret
    - group: generators.external-secrets.io
      kind: VaultDynamicSecret
