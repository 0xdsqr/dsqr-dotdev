apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hub-a-traefik-origin
  namespace: traefik
  labels:
    app.kubernetes.io/name: hub-a-traefik-origin
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: cluster-ingress
    homelab.dev/cluster: hub-a
    homelab.dev/owner: platform
    homelab.dev/tier: platform-secret
spec:
  refreshPolicy: Periodic
  refreshInterval: 240h
  target:
    name: hub-a-traefik-origin-tls
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: kubernetes.io/tls
      metadata:
        labels:
          app.kubernetes.io/name: hub-a-traefik-origin-tls
          app.kubernetes.io/managed-by: external-secrets
          app.kubernetes.io/part-of: cluster-ingress
          homelab.dev/cluster: hub-a
          homelab.dev/owner: platform
          homelab.dev/tier: platform-secret
      data:
        tls.crt: |
          {{ .certificate }}
          {{ .issuing_ca }}
        tls.key: |
          {{ .private_key }}
        ca.crt: |
          {{ .issuing_ca }}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: hub-a-traefik-origin
