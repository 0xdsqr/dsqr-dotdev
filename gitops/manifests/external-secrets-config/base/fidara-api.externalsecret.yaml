apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fidara-api-secrets
  namespace: fidara
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: fidara-api-secrets
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: fidara
    homelab.dev/owner: fidara
    homelab.dev/tier: application-secret
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: vault-hub-a
    kind: ClusterSecretStore
  target:
    name: fidara-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: fidara-api-secrets
          app.kubernetes.io/managed-by: external-secrets
          homelab.dev/owner: fidara
          homelab.dev/tier: application-secret
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: homelab/apps/fidara/api
        property: DATABASE_URL
    - secretKey: FIDARA_API_KEY_PEPPER
      remoteRef:
        key: homelab/apps/fidara/api
        property: FIDARA_API_KEY_PEPPER
    - secretKey: FIDARA_API_KEYS
      remoteRef:
        key: homelab/apps/fidara/api
        property: FIDARA_API_KEYS
