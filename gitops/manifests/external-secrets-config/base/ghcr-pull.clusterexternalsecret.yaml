apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ghcr-creds
  labels:
    app.kubernetes.io/name: ghcr-creds
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: cluster-secrets
    homelab.dev/owner: platform
    homelab.dev/tier: platform-secret
spec:
  externalSecretName: ghcr-creds
  namespaceSelectors:
    - matchLabels:
        homelab.dev/ghcr-pull: "true"
  refreshTime: 15m
  externalSecretSpec:
    refreshPolicy: Periodic
    refreshInterval: 1h
    secretStoreRef:
      name: vault-hub-a
      kind: ClusterSecretStore
    target:
      name: ghcr-creds
      creationPolicy: Owner
      deletionPolicy: Retain
      template:
        engineVersion: v2
        type: kubernetes.io/dockerconfigjson
        metadata:
          labels:
            app.kubernetes.io/name: ghcr-creds
            app.kubernetes.io/managed-by: external-secrets
            homelab.dev/owner: platform
            homelab.dev/tier: platform-secret
        data:
          .dockerconfigjson: >-
            {"auths":{"{{ .server }}":{"username":"{{ .username }}","password":"{{ .password }}","email":"{{ .email }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
    data:
      - secretKey: server
        remoteRef:
          key: homelab/platform/github/ghcr-pull
          property: server
      - secretKey: username
        remoteRef:
          key: homelab/platform/github/ghcr-pull
          property: username
      - secretKey: password
        remoteRef:
          key: homelab/platform/github/ghcr-pull
          property: password
      - secretKey: email
        remoteRef:
          key: homelab/platform/github/ghcr-pull
          property: email
