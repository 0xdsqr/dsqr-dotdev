apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dotdev-labs-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: dotdev-labs-secrets
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: dsqr-dotdev
    homelab.dev/owner: dsqr
    homelab.dev/tier: application-secret
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    name: vault-homelab
    kind: ClusterSecretStore
  target:
    name: dotdev-labs-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: dotdev-labs-secrets
          app.kubernetes.io/managed-by: external-secrets
          homelab.dev/owner: dsqr
          homelab.dev/tier: application-secret
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: homelab/apps/dsqr/dotdev-labs
        property: AUTH_SECRET
    - secretKey: DATABASE_URL
      remoteRef:
        key: homelab/apps/dsqr/dotdev-labs
        property: DATABASE_URL
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: homelab/apps/dsqr/dotdev-labs
        property: RESEND_API_KEY
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: homelab/apps/dsqr/dotdev-labs
        property: S3_ACCESS_KEY
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: homelab/apps/dsqr/dotdev-labs
        property: S3_SECRET_KEY
