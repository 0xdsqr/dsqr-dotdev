# Homelab-only Helm value overrides for fidara.
# Use this for cluster-specific external chart values that should layer on top of fidara's own values-prod.yaml.
networkPolicy:
  ingress:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: traefik
      - podSelector:
          matchLabels:
            app.kubernetes.io/instance: fidara
            app.kubernetes.io/name: fidara
            app.kubernetes.io/component: web

web:
  env:
    FIDARA_API_BASE_URL: http://fidara-api
    OTEL_SERVICE_NAME: fidara-web
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,k8s.namespace.name=fidara
  networkPolicy:
    extraEgress:
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/instance: fidara
                app.kubernetes.io/name: fidara
                app.kubernetes.io/component: api
        ports:
          - protocol: TCP
            port: 80
          - protocol: TCP
            port: 8080
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: observability
        ports:
          - protocol: TCP
            port: 4318

api:
  env:
    FIDARA_SEARCH_BACKEND: auto
    OTEL_SERVICE_NAME: fidara-api
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
    OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod,k8s.namespace.name=fidara
  networkPolicy:
    extraEgress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: observability
        ports:
          - protocol: TCP
            port: 4318
