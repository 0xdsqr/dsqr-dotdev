apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: platform-addons
    app.kubernetes.io/part-of: dsqr-gitops
    homelab.dev/tier: platform
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - list:
        elements:
          - name: cilium
            namespace: kube-system
            chart: cilium
            chartRepoURL: https://helm.cilium.io/
            targetRevision: 1.19.1
            releaseName: cilium
            valuesFile: infra/inventory/values/kubernetes/cilium.yaml
            owner: platform
            partOf: cluster-networking
          - name: metallb
            namespace: metallb-system
            chart: metallb
            chartRepoURL: https://metallb.github.io/metallb
            targetRevision: 0.15.3
            releaseName: metallb
            valuesFile: infra/inventory/values/kubernetes/metallb.yaml
            owner: platform
            partOf: cluster-networking
          - name: traefik
            namespace: traefik
            chart: traefik
            chartRepoURL: https://traefik.github.io/charts
            targetRevision: 39.0.7
            releaseName: traefik
            valuesFile: infra/inventory/values/kubernetes/traefik.yaml
            owner: platform
            partOf: cluster-ingress
          - name: kube-state-metrics
            namespace: kube-system
            chart: kube-state-metrics
            chartRepoURL: https://prometheus-community.github.io/helm-charts
            targetRevision: 7.2.2
            releaseName: kube-state-metrics
            valuesFile: infra/inventory/values/kubernetes/kube-state-metrics.yaml
            owner: platform
            partOf: observability
          - name: k8s-monitoring
            namespace: observability
            chart: k8s-monitoring
            chartRepoURL: https://grafana.github.io/helm-charts
            targetRevision: 3.5.3
            releaseName: k8s-monitoring
            valuesFile: infra/inventory/values/kubernetes/k8s-monitoring.yaml
            owner: platform
            partOf: observability
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        homelab.dev/chart: '{{.chart}}'
        homelab.dev/chart-repository: '{{.chartRepoURL}}'
        homelab.dev/chart-version: '{{.targetRevision}}'
        homelab.dev/values-file: '{{.valuesFile}}'
      labels:
        app.kubernetes.io/instance: '{{.releaseName}}'
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: '{{.name}}'
        app.kubernetes.io/part-of: '{{.partOf}}'
        app.kubernetes.io/version: '{{.targetRevision}}'
        homelab.dev/owner: '{{.owner}}'
        homelab.dev/tier: platform-addon
    spec:
      project: platform
      sources:
        - repoURL: '{{.chartRepoURL}}'
          chart: '{{.chart}}'
          targetRevision: '{{.targetRevision}}'
          helm:
            releaseName: '{{.releaseName}}'
            valueFiles:
              - '$values/{{.valuesFile}}'
        - repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
          targetRevision: master
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          enabled: false
        retry:
          limit: 3
          refresh: true
          backoff:
            duration: 20s
            factor: 2
            maxDuration: 2m
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
