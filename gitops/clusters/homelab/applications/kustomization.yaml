apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../manifests/argocd/base
  - argocd.yaml
  - cilium.yaml
  - metallb.yaml
  - metallb-config.yaml
  - traefik.yaml
  - metrics-server.yaml
  - kube-state-metrics.yaml
  - k8s-monitoring.yaml
  - external-secrets.yaml
  - external-secrets-config.yaml
  - dotdev-web.yaml
  - dotdev-studio.yaml
  - dotdev-labs.yaml
  - fidara.yaml
  - twt-web.yaml
  - twt-admin.yaml

patches:
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: fidara
    patch: |-
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1image-list
        value: fidara-web=ghcr.io/0xdsqr/fidara-web,fidara-api=ghcr.io/0xdsqr/fidara-api
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1write-back-method
        value: git
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1git-branch
        value: master
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1write-back-target
        value: helmvalues:values-prod.yaml
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1fidara-web.update-strategy
        value: newest-build
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1fidara-web.allow-tags
        value: regexp:^sha-[0-9a-f]{40}$
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1fidara-web.helm.image-name
        value: web.image.repository
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1fidara-web.helm.image-tag
        value: web.image.tag
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1fidara-api.update-strategy
        value: newest-build
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1fidara-api.allow-tags
        value: regexp:^sha-[0-9a-f]{40}$
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1fidara-api.helm.image-name
        value: api.image.repository
      - op: add
        path: /metadata/annotations/argocd-image-updater.argoproj.io~1fidara-api.helm.image-tag
        value: api.image.tag
