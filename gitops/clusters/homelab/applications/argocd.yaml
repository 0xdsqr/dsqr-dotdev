      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      enabled: false
      prune: false
      selfHeal: false
    retry:
      limit: 3
      refresh: true
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - ApplyOutOfSyncOnly=true
