apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dsqr-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: dsqr-apps
    app.kubernetes.io/part-of: dsqr-gitops
    homelab.dev/tier: apps
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: dotdev-web
            namespace: dsqr
            path: helm/dotdev-web
            releaseName: dotdev-web
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: master
            owner: dsqr
            partOf: dsqr-dotdev
            hostname: dsqr.dev
            imageRepository: ghcr.io/0xdsqr/dotdev-web
            imageTag: sha-c8e6efad9f6a6125f22d5cddba5f678cc5de6474
            syncStage: manual
          - name: dotdev-studio
            namespace: dsqr
            path: helm/dotdev-studio
            releaseName: dotdev-studio
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: master
            owner: dsqr
            partOf: dsqr-dotdev
            hostname: studio.dsqr.dev
            imageRepository: ghcr.io/0xdsqr/dotdev-studio
            imageTag: sha-c8e6efad9f6a6125f22d5cddba5f678cc5de6474
            syncStage: manual
          - name: dotdev-labs
            namespace: dsqr
            path: helm/dotdev-labs
            releaseName: dotdev-labs
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: master
            owner: dsqr
            partOf: dsqr-dotdev
            hostname: labs.dsqr.dev
            imageRepository: ghcr.io/0xdsqr/dotdev-labs
            imageTag: sha-c8e6efad9f6a6125f22d5cddba5f678cc5de6474
            syncStage: canary
          - name: fidara
            namespace: fidara
            path: helm/fidara
            releaseName: fidara
            repoURL: https://github.com/0xdsqr/fidara.git
            targetRevision: master
            owner: fidara
            partOf: fidara
            hostname: fidara.io
            imageRepository: ghcr.io/0xdsqr/fidara-web
            imageTag: sha-5dc66f2629763e17f4b36f988052de9c8c1ac847
            syncStage: manual
          - name: twt-web
            namespace: twt
            path: helm/tastingswithtay-web
            releaseName: twt-web
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: master
            owner: twt
            partOf: tastingswithtay
            hostname: tastingswithtay.com
            imageRepository: ghcr.io/0xdsqr/tastingswithtay-web
            imageTag: latest
            syncStage: manual
          - name: twt-admin
            namespace: twt
            path: helm/tastingswithtay-admin
            releaseName: twt-admin
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: master
            owner: twt
            partOf: tastingswithtay
            hostname: admin.tastingswithtay.com
            imageRepository: ghcr.io/0xdsqr/tastingswithtay-admin
            imageTag: latest
            syncStage: manual
  template:
    metadata:
      name: '{{.name}}'
      annotations:
        homelab.dev/hostname: '{{.hostname}}'
        homelab.dev/image-repository: '{{.imageRepository}}'
        homelab.dev/image-tag: '{{.imageTag}}'
        homelab.dev/source-path: '{{.path}}'
        homelab.dev/sync-stage: '{{.syncStage}}'
      labels:
        app.kubernetes.io/instance: '{{.releaseName}}'
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: '{{.name}}'
        app.kubernetes.io/part-of: '{{.partOf}}'
        app.kubernetes.io/version: '{{.imageTag}}'
        homelab.dev/owner: '{{.owner}}'
        homelab.dev/tier: application
    spec:
      project: dsqr
      source:
        repoURL: '{{.repoURL}}'
        targetRevision: '{{.targetRevision}}'
        path: '{{.path}}'
        helm:
          releaseName: '{{.releaseName}}'
          valueFiles:
            - values-prod.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          enabled: true
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            homelab.dev/owner: '{{.owner}}'
            homelab.dev/tier: apps
            pod-security.kubernetes.io/enforce: baseline
        retry:
          limit: 3
          refresh: true
          backoff:
            duration: 20s
            factor: 2
            maxDuration: 2m
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - PruneLast=true
