apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dsqr-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: dsqr-gitops
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - name: dotdev-web
            namespace: dsqr
            path: helm/dotdev-web
            releaseName: dotdev-web
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: codex/homelab-migration
          - name: dotdev-studio
            namespace: dsqr
            path: helm/dotdev-studio
            releaseName: dotdev-studio
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: codex/homelab-migration
          - name: dotdev-labs
            namespace: dsqr
            path: helm/dotdev-labs
            releaseName: dotdev-labs
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: codex/homelab-migration
          - name: twt-web
            namespace: twt
            path: helm/tastingswithtay-web
            releaseName: twt-web
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: codex/homelab-migration
          - name: twt-admin
            namespace: twt
            path: helm/tastingswithtay-admin
            releaseName: twt-admin
            repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
            targetRevision: codex/homelab-migration
  template:
    metadata:
      name: '{{.name}}'
      labels:
        app.kubernetes.io/part-of: dsqr-gitops
    spec:
      project: dsqr
      source:
        repoURL: '{{.repoURL}}'
        targetRevision: '{{.targetRevision}}'
        path: '{{.path}}'
        helm:
          releaseName: '{{.releaseName}}'
          valueFiles:
            - values-prod.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
