apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-a
  namespace: argocd
  labels:
    app.kubernetes.io/name: hub-a
    app.kubernetes.io/part-of: dsqr-gitops
    homelab.dev/cluster: hub-a
    homelab.dev/environment: homelab
    homelab.dev/physical-host: dell-r730xd
    homelab.dev/tier: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
    targetRevision: master
    path: gitops/clusters/hub-a/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 5
      refresh: true
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ApplyOutOfSyncOnly=true
