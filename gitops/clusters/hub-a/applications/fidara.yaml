# Generated by `nix run .#gitopsGenerateApplications`.
# Cluster-specific values are loaded through the ref-only values source below.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fidara
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    homelab.dev/hostname: fidara.io
  labels:
    app.kubernetes.io/instance: fidara
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: fidara
    app.kubernetes.io/part-of: fidara
    homelab.dev/owner: fidara
    homelab.dev/tier: application
spec:
  project: fidara
  sources:
    - repoURL: https://github.com/0xdsqr/fidara.git
      targetRevision: refs/heads/master
      path: helm/fidara
      helm:
        releaseName: fidara
        valueFiles:
          - values-prod.yaml
          - $values/gitops/values/fidara/common.yaml
          - $values/gitops/values/fidara/hub-a.yaml
    - repoURL: https://github.com/0xdsqr/dsqr-dotdev.git
      targetRevision: refs/heads/master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: fidara
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    retry:
      limit: 3
      refresh: true
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - FailOnSharedResource=true
      - PruneLast=true
