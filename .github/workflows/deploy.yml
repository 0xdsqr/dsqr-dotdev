name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # Run the full test suite before deploying
  test:
    name: test
    uses: ./.github/workflows/test.yml

  deploy:
    name: deploy
    needs: test
    runs-on: [self-hosted, dotdev, dsqr]
    steps:
      - name: deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}       # e.g. 192.168.50.27
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}       # e.g. sysdsqr
          NIXOS_CONFIG_PATH: ${{ secrets.NIXOS_CONFIG_PATH }}  # e.g. /home/sysdsqr/nixos-config
        run: |
          set -euo pipefail

          echo "Updating dsqr-dotdev flake input..."
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $NIXOS_CONFIG_PATH && nix flake update dsqr-dotdev"

          echo "Rebuilding NixOS configuration..."
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $NIXOS_CONFIG_PATH && sudo nixos-rebuild switch --flake ."

          echo "Deployed dsqr-dotdev @ $GITHUB_SHA"
