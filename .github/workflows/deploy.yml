name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: [self-hosted, dotdev, dsqr]
    env:
      PATH: /run/current-system/sw/bin:/usr/bin:/bin
    steps:
      - name: deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          NIXOS_CONFIG_PATH: ${{ secrets.NIXOS_CONFIG_PATH }}
        run: |
          set -euo pipefail
          SSH="ssh -i /var/lib/github-runners/.ssh/dsqr_homelab_ed25519"

          echo "Updating dsqr-dotdev flake input..."
          $SSH "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $NIXOS_CONFIG_PATH && nix flake update dsqr-dotdev"

          echo "Rebuilding NixOS configuration..."
          $SSH "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd $NIXOS_CONFIG_PATH && sudo NIXPKGS_ALLOW_UNFREE=1 NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM=1 nixos-rebuild switch --impure --flake .#dsqr-server-vm-x86_64"

          echo "Deployed dsqr-dotdev @ $GITHUB_SHA"
