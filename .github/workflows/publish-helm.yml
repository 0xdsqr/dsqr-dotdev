name: Publish Helm Charts

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/publish-helm.yml"
      - "helm/dotdev-web/**"
      - "helm/dotdev-studio/**"
      - "helm/dotdev-labs/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HELM_REGISTRY_REPOSITORY: oci://ghcr.io/${{ github.repository }}/charts

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-helm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-charts:
    name: Detect chart changes
    runs-on: ubuntu-latest
    outputs:
      dotdev: ${{ steps.charts.outputs.dotdev }}
      studio: ${{ steps.charts.outputs.studio }}
      labs: ${{ steps.charts.outputs.labs }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect affected charts
        id: charts
        shell: bash
        run: |
          set -euo pipefail

          dotdev=false
          studio=false
          labs=false

          mark_all() {
            dotdev=true
            studio=true
            labs=true
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mark_all
          else
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              base="$(git rev-parse HEAD^)"
            fi

            while IFS= read -r path; do
              [[ -z "$path" ]] && continue

              case "$path" in
                .github/workflows/publish-helm.yml)
                  mark_all
                  ;;
                helm/dotdev-web/**)
                  dotdev=true
                  ;;
                helm/dotdev-studio/**)
                  studio=true
                  ;;
                helm/dotdev-labs/**)
                  labs=true
                  ;;
              esac
            done < <(git diff --name-only "$base" "${{ github.sha }}")
          fi

          {
            echo "dotdev=$dotdev"
            echo "studio=$studio"
            echo "labs=$labs"
          } | tee -a "$GITHUB_OUTPUT"

  publish-dotdev:
    name: Publish dotdev-web chart
    runs-on: ubuntu-latest
    needs:
      - detect-charts
    if: ${{ needs.detect-charts.outputs.dotdev == 'true' }}
    env:
      CHART_VERSION: 0.1.${{ github.run_number }}-r${{ github.run_attempt }}
      CHART_NAME: dotdev-web
      CHART_NAMESPACE: dsqr

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Verify chart
        run: helm lint "./helm/${CHART_NAME}"

      - name: Render chart
        run: |
          helm template "${CHART_NAME}" "./helm/${CHART_NAME}" \
            --namespace "${CHART_NAMESPACE}" \
            -f "./helm/${CHART_NAME}/values-prod.yaml"

      - name: Publish chart
        run: |
          package_dir="$(mktemp -d)"
          helm package "./helm/${CHART_NAME}" \
            --version "${CHART_VERSION}" \
            --destination "${package_dir}"
          helm push "${package_dir}/${CHART_NAME}-${CHART_VERSION}.tgz" \
            "${HELM_REGISTRY_REPOSITORY}"

  publish-studio:
    name: Publish dotdev-studio chart
    runs-on: ubuntu-latest
    needs:
      - detect-charts
    if: ${{ needs.detect-charts.outputs.studio == 'true' }}
    env:
      CHART_VERSION: 0.1.${{ github.run_number }}-r${{ github.run_attempt }}
      CHART_NAME: dotdev-studio
      CHART_NAMESPACE: dsqr

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Verify chart
        run: helm lint "./helm/${CHART_NAME}"

      - name: Render chart
        run: |
          helm template "${CHART_NAME}" "./helm/${CHART_NAME}" \
            --namespace "${CHART_NAMESPACE}" \
            -f "./helm/${CHART_NAME}/values-prod.yaml"

      - name: Publish chart
        run: |
          package_dir="$(mktemp -d)"
          helm package "./helm/${CHART_NAME}" \
            --version "${CHART_VERSION}" \
            --destination "${package_dir}"
          helm push "${package_dir}/${CHART_NAME}-${CHART_VERSION}.tgz" \
            "${HELM_REGISTRY_REPOSITORY}"

  publish-labs:
    name: Publish dotdev-labs chart
    runs-on: ubuntu-latest
    needs:
      - detect-charts
    if: ${{ needs.detect-charts.outputs.labs == 'true' }}
    env:
      CHART_VERSION: 0.1.${{ github.run_number }}-r${{ github.run_attempt }}
      CHART_NAME: dotdev-labs
      CHART_NAMESPACE: dsqr

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Verify chart
        run: helm lint "./helm/${CHART_NAME}"

      - name: Render chart
        run: |
          helm template "${CHART_NAME}" "./helm/${CHART_NAME}" \
            --namespace "${CHART_NAMESPACE}" \
            -f "./helm/${CHART_NAME}/values-prod.yaml"

      - name: Publish chart
        run: |
          package_dir="$(mktemp -d)"
          helm package "./helm/${CHART_NAME}" \
            --version "${CHART_VERSION}" \
            --destination "${package_dir}"
          helm push "${package_dir}/${CHART_NAME}-${CHART_VERSION}.tgz" \
            "${HELM_REGISTRY_REPOSITORY}"
