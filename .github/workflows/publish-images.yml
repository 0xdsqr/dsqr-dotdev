name: Publish Images

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: publish-images-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish released image versions
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 2
          persist-credentials: false

      - name: Select the current validated master revision
        id: revision
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/master:refs/remotes/origin/master
          actual="$(git rev-parse refs/remotes/origin/master)"
          echo "actual=$actual" >> "$GITHUB_OUTPUT"
          if [[ "$actual" != "$TARGET_SHA" ]]; then
            echo "Validated revision $TARGET_SHA is no longer master ($actual); a newer run will handle it."
            echo "current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "current=true" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        if: ${{ steps.revision.outputs.current == 'true' }}
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Publish immutable SemVer aliases
        if: ${{ steps.revision.outputs.current == 'true' }}
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USERNAME: ${{ github.repository_owner }}
          RELEASE_HEAD_REVISION: ${{ env.TARGET_SHA }}
          RELEASE_REGISTRY_OWNER: ${{ github.repository_owner }}
        run: nix run .#releasePublishImages --
