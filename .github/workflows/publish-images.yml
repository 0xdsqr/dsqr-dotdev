name: Publish Images

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/publish-images.yml"
      - "apps/dotdev/**"
      - "apps/labs/**"
      - "apps/studio/**"
      - "flake.lock"
      - "flake.nix"
      - "nix/hashes.nix"
      - "nix/lib/**"
      - "nix/overlay.nix"
      - "nix/packages/app.nix"
      - "nix/packages/default.nix"
      - "nix/packages/dotdev.nix"
      - "nix/packages/gitops-tag-images.nix"
      - "nix/packages/images.nix"
      - "nix/packages/labs.nix"
      - "nix/packages/node-modules.nix"
      - "nix/packages/studio.nix"
      - "package-lock.json"
      - "package.json"
      - "packages/api/**"
      - "packages/database/**"
      - "packages/observability/**"
      - "packages/react/**"
      - "packages/typescript-config/**"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect app changes
    runs-on: ubuntu-latest
    outputs:
      dotdev: ${{ steps.apps.outputs.dotdev }}
      studio: ${{ steps.apps.outputs.studio }}
      labs: ${{ steps.apps.outputs.labs }}
      any: ${{ steps.apps.outputs.any }}
      apps: ${{ steps.apps.outputs.apps }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect affected apps
        id: apps
        shell: bash
        run: |
          set -euo pipefail

          dotdev=false
          studio=false
          labs=false

          mark_all() {
            dotdev=true
            studio=true
            labs=true
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mark_all
          else
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              base="$(git rev-parse HEAD^)"
            fi

            while IFS= read -r path; do
              [[ -z "$path" ]] && continue

              case "$path" in
                apps/dotdev/**|nix/packages/dotdev.nix)
                  dotdev=true
                  ;;
                apps/studio/**|nix/packages/studio.nix)
                  studio=true
                  ;;
                apps/labs/**|nix/packages/labs.nix)
                  labs=true
                  ;;
                .github/workflows/publish-images.yml|flake.lock|flake.nix|package-lock.json|package.json|nix/hashes.nix|nix/overlay.nix|nix/lib/**|nix/packages/app.nix|nix/packages/default.nix|nix/packages/gitops-tag-images.nix|nix/packages/images.nix|nix/packages/node-modules.nix|packages/**)
                  mark_all
                  ;;
              esac
            done < <(git diff --name-only "$base" "${{ github.sha }}")
          fi

          apps=()
          [[ "$dotdev" == true ]] && apps+=(dotdev-web)
          [[ "$studio" == true ]] && apps+=(dotdev-studio)
          [[ "$labs" == true ]] && apps+=(dotdev-labs)

          any=false
          [[ ${#apps[@]} -gt 0 ]] && any=true

          {
            echo "dotdev=$dotdev"
            echo "studio=$studio"
            echo "labs=$labs"
            echo "any=$any"
            echo "apps=${apps[*]}"
          } | tee -a "$GITHUB_OUTPUT"

  publish-dotdev:
    name: Publish dotdev-web
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.dotdev == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: nix build .#dotdevImage --out-link result-dotdev

      - name: Load and push image
        run: |
          docker load < result-dotdev
          docker tag dotdev-web:latest ghcr.io/${{ github.repository_owner }}/dotdev-web:latest
          docker tag dotdev-web:latest ghcr.io/${{ github.repository_owner }}/dotdev-web:sha-${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/dotdev-web:latest
          docker push ghcr.io/${{ github.repository_owner }}/dotdev-web:sha-${{ github.sha }}

  publish-studio:
    name: Publish dotdev-studio
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.studio == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: nix build .#studioImage --out-link result-studio

      - name: Load and push image
        run: |
          docker load < result-studio
          docker tag dotdev-studio:latest ghcr.io/${{ github.repository_owner }}/dotdev-studio:latest
          docker tag dotdev-studio:latest ghcr.io/${{ github.repository_owner }}/dotdev-studio:sha-${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/dotdev-studio:latest
          docker push ghcr.io/${{ github.repository_owner }}/dotdev-studio:sha-${{ github.sha }}

  publish-labs:
    name: Publish dotdev-labs
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.labs == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: nix build .#labsImage --out-link result-labs

      - name: Load and push image
        run: |
          docker load < result-labs
          docker tag dotdev-labs:latest ghcr.io/${{ github.repository_owner }}/dotdev-labs:latest
          docker tag dotdev-labs:latest ghcr.io/${{ github.repository_owner }}/dotdev-labs:sha-${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/dotdev-labs:latest
          docker push ghcr.io/${{ github.repository_owner }}/dotdev-labs:sha-${{ github.sha }}

  stamp-gitops-tags:
    name: Stamp GitOps image tags
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - publish-dotdev
      - publish-studio
      - publish-labs
    if: >-
      ${{
        always() &&
        needs.detect-changes.outputs.any == 'true' &&
        (needs.detect-changes.outputs.dotdev != 'true' || needs.publish-dotdev.result == 'success') &&
        (needs.detect-changes.outputs.studio != 'true' || needs.publish-studio.result == 'success') &&
        (needs.detect-changes.outputs.labs != 'true' || needs.publish-labs.result == 'success')
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Stamp immutable image tags
        run: nix run .#gitopsTagImages -- --tag sha-${{ github.sha }} ${{ needs.detect-changes.outputs.apps }}

      - name: Render GitOps manifests
        run: nix develop -c npm run gitops:render

      - name: Commit GitOps tag update
        run: |
          if git diff --quiet; then
            echo "GitOps image tags already point at sha-${{ github.sha }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/dotdev-web/Chart.yaml helm/dotdev-studio/Chart.yaml helm/dotdev-labs/Chart.yaml
          git add helm/dotdev-web/values-prod.yaml helm/dotdev-studio/values-prod.yaml helm/dotdev-labs/values-prod.yaml
          git add gitops/templates/applications/dotdev-web.yaml.tmpl
          git add gitops/templates/applications/dotdev-studio.yaml.tmpl
          git add gitops/templates/applications/dotdev-labs.yaml.tmpl
          git add gitops/clusters/homelab/applications/dotdev-web.yaml
          git add gitops/clusters/homelab/applications/dotdev-studio.yaml
          git add gitops/clusters/homelab/applications/dotdev-labs.yaml
          git commit -m "chore(gitops): pin dsqr images to sha-${{ github.sha }}"
          git push origin HEAD:${{ github.ref_name }}
