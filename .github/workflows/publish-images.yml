name: Publish Images

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: publish-images-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect app changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') ||
        (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success')
      }}
    outputs:
      dotdev: ${{ steps.apps.outputs.dotdev }}
      studio: ${{ steps.apps.outputs.studio }}
      labs: ${{ steps.apps.outputs.labs }}
      any: ${{ steps.apps.outputs.any }}
      apps: ${{ steps.apps.outputs.apps }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 2
          persist-credentials: false

      - name: Detect affected apps
        id: apps
        shell: bash
        run: |
          set -euo pipefail

          dotdev=false
          studio=false
          labs=false

          mark_all() {
            dotdev=true
            studio=true
            labs=true
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mark_all
          else
            # workflow_run does not expose the complete push range. Publish all
            # three images for normal master updates so a multi-commit or rebase
            # merge cannot silently omit an affected app. The one exception is
            # the tag-only PR created by this workflow: publishing that commit
            # would create another tag PR and perpetuate the workflow forever.
            automation_only=true
            changed=false

            while IFS= read -r path; do
              [[ -z "$path" ]] && continue
              changed=true

              case "$path" in
                helm/dotdev-web/Chart.yaml|helm/dotdev-web/values-prod.yaml|\
                helm/dotdev-studio/Chart.yaml|helm/dotdev-studio/values-prod.yaml|\
                helm/dotdev-labs/Chart.yaml|helm/dotdev-labs/values-prod.yaml|\
                gitops/templates/applications/dotdev-web.yaml.tmpl|\
                gitops/templates/applications/dotdev-studio.yaml.tmpl|\
                gitops/templates/applications/dotdev-labs.yaml.tmpl|\
                gitops/clusters/homelab/applications/dotdev-web.yaml|\
                gitops/clusters/homelab/applications/dotdev-studio.yaml|\
                gitops/clusters/homelab/applications/dotdev-labs.yaml)
                  ;;
                *)
                  automation_only=false
                  ;;
              esac
            done < <(git diff-tree --no-commit-id --name-only -r "$TARGET_SHA")

            subject="$(git log -1 --format=%s "$TARGET_SHA")"
            if [[ "$changed" == true && "$automation_only" == true && "$subject" == chore\(gitops\):\ pin\ dsqr\ images\ to\ sha-* ]]; then
              echo "Skipping image publication for the workflow's tag-only GitOps commit"
            else
              mark_all
            fi
          fi

          apps=()
          [[ "$dotdev" == true ]] && apps+=(dotdev-web)
          [[ "$studio" == true ]] && apps+=(dotdev-studio)
          [[ "$labs" == true ]] && apps+=(dotdev-labs)

          any=false
          [[ ${#apps[@]} -gt 0 ]] && any=true

          {
            echo "dotdev=$dotdev"
            echo "studio=$studio"
            echo "labs=$labs"
            echo "any=$any"
            echo "apps=${apps[*]}"
          } | tee -a "$GITHUB_OUTPUT"

  publish-dotdev:
    name: Publish dotdev-web
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.dotdev == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: nix build .#dotdevImage --out-link result-dotdev

      - name: Load and push image
        run: |
          docker load < result-dotdev
          docker tag dotdev-web:latest "ghcr.io/${{ github.repository_owner }}/dotdev-web:sha-${TARGET_SHA}"
          docker push "ghcr.io/${{ github.repository_owner }}/dotdev-web:sha-${TARGET_SHA}"

  publish-studio:
    name: Publish dotdev-studio
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.studio == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: nix build .#studioImage --out-link result-studio

      - name: Load and push image
        run: |
          docker load < result-studio
          docker tag dotdev-studio:latest "ghcr.io/${{ github.repository_owner }}/dotdev-studio:sha-${TARGET_SHA}"
          docker push "ghcr.io/${{ github.repository_owner }}/dotdev-studio:sha-${TARGET_SHA}"

  publish-labs:
    name: Publish dotdev-labs
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    needs:
      - detect-changes
    if: ${{ needs.detect-changes.outputs.labs == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: nix build .#labsImage --out-link result-labs

      - name: Load and push image
        run: |
          docker load < result-labs
          docker tag dotdev-labs:latest "ghcr.io/${{ github.repository_owner }}/dotdev-labs:sha-${TARGET_SHA}"
          docker push "ghcr.io/${{ github.repository_owner }}/dotdev-labs:sha-${TARGET_SHA}"

  stamp-gitops-tags:
    name: Propose GitOps image tags
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      pull-requests: write
    needs:
      - detect-changes
      - publish-dotdev
      - publish-studio
      - publish-labs
    if: >-
      ${{
        always() &&
        needs.detect-changes.outputs.any == 'true' &&
        (needs.detect-changes.outputs.dotdev != 'true' || needs.publish-dotdev.result == 'success') &&
        (needs.detect-changes.outputs.studio != 'true' || needs.publish-studio.result == 'success') &&
        (needs.detect-changes.outputs.labs != 'true' || needs.publish-labs.result == 'success')
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3

      - name: Stamp immutable image tags
        env:
          APPS: ${{ needs.detect-changes.outputs.apps }}
        run: |
          read -r -a apps <<< "$APPS"
          nix run .#gitopsTagImages -- --tag "sha-${TARGET_SHA}" "${apps[@]}"

      - name: Render GitOps manifests
        run: nix develop -c npm run gitops:render

      - name: Open GitOps tag update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "GitOps image tags already point at sha-${TARGET_SHA}"
            exit 0
          fi

          branch="automation/gitops-images-${TARGET_SHA}"
          if [[ "$(gh pr list --head "$branch" --state open --json number --jq 'length')" != "0" ]]; then
            echo "A GitOps image update pull request already exists for ${TARGET_SHA}"
            gh workflow run ci.yml --ref "$branch"
            exit 0
          fi

          git switch -c "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/dotdev-web/Chart.yaml helm/dotdev-studio/Chart.yaml helm/dotdev-labs/Chart.yaml
          git add helm/dotdev-web/values-prod.yaml helm/dotdev-studio/values-prod.yaml helm/dotdev-labs/values-prod.yaml
          git add gitops/templates/applications/dotdev-web.yaml.tmpl
          git add gitops/templates/applications/dotdev-studio.yaml.tmpl
          git add gitops/templates/applications/dotdev-labs.yaml.tmpl
          git add gitops/clusters/homelab/applications/dotdev-web.yaml
          git add gitops/clusters/homelab/applications/dotdev-studio.yaml
          git add gitops/clusters/homelab/applications/dotdev-labs.yaml
          git commit -m "chore(gitops): pin dsqr images to sha-${TARGET_SHA}"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base master \
            --head "$branch" \
            --title "chore(gitops): pin dsqr images to sha-${TARGET_SHA}" \
            --body "Automated image-tag update after the required checks and image publication succeeded for ${TARGET_SHA}."
          gh workflow run ci.yml --ref "$branch"
