name: Publish Images

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: publish-images-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish released image versions
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}

    steps:
      - name: Check out release commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 2
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3

      - name: Publish immutable SemVer aliases
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_USERNAME: ${{ github.repository_owner }}
          RELEASE_HEAD_REVISION: ${{ env.TARGET_SHA }}
          RELEASE_REGISTRY_OWNER: ${{ github.repository_owner }}
        run: nix run .#releasePublishImages --
