name: Publish Dotdev Web Artifacts

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-dotdev-web-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dotdev-web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/dotdev/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dotdev-web:latest
            ghcr.io/${{ github.repository_owner }}/dotdev-web:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-chart:
    runs-on: ubuntu-latest
    env:
      CHART_VERSION: 0.1.${{ github.run_number }}-r${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ./helm/dotdev-web

      - name: Render chart
        run: |
          helm template dotdev-web ./helm/dotdev-web \
            --namespace dsqr \
            -f ./helm/dotdev-web/values-prod.yaml

      - name: Log in to GitHub Container Registry for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Package chart
        run: |
          helm package ./helm/dotdev-web \
            --version "${CHART_VERSION}" \
            --app-version "sha-${{ github.sha }}"

      - name: Push chart to GHCR
        run: helm push dotdev-web-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
