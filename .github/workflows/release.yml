name: Release

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  packages: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: changesets-release-master
  cancel-in-progress: true

jobs:
  version:
    name: Update Version Packages pull request
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}

    steps:
      - name: Check out master
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Select the validated master revision
        id: revision
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          echo "actual=$actual" >> "$GITHUB_OUTPUT"
          if [[ "$actual" != "$TARGET_SHA" ]]; then
            echo "Validated revision $TARGET_SHA is no longer master ($actual); a newer run will handle it."
            echo "current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "current=true" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        if: ${{ steps.revision.outputs.current == 'true' }}
        uses: DeterminateSystems/determinate-nix-action@c70cb8ae92d68c66953db28a26a63db1665bc837 # v3

      - name: Log in to GitHub Container Registry
        if: ${{ steps.revision.outputs.current == 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update signed Version Packages pull request
        id: changesets
        if: ${{ steps.revision.outputs.current == 'true' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          branch: master
          commit: "chore(release): version packages"
          commitMode: github-api
          createGithubReleases: false
          prDraft: create
          title: "chore(release): version packages"
          version: nix run .#releasePrepare --
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REGISTRY_OWNER: ${{ github.repository_owner }}
          RELEASE_SOURCE_REVISION: ${{ env.TARGET_SHA }}

      - name: Run checks for the release pull request
        if: >-
          ${{
            steps.revision.outputs.current == 'true' &&
            steps.changesets.outputs.pullRequestNumber != ''
          }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          set -euo pipefail
          head_ref="$(gh pr view "$PULL_REQUEST_NUMBER" --json headRefName --jq '.headRefName')"
          gh workflow run ci.yml --ref "$head_ref"

      - name: Summarize the release decision
        if: ${{ always() }}
        shell: bash
        env:
          ACTUAL_SHA: ${{ steps.revision.outputs.actual }}
          CHANGESETS_OUTCOME: ${{ steps.changesets.outcome }}
          CURRENT_REVISION: ${{ steps.revision.outputs.current }}
          PULL_REQUEST_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          set -euo pipefail
          {
            echo "## Changesets release"
            echo
            if [[ "$CURRENT_REVISION" == "true" ]]; then
              echo "Validated current master revision \`$TARGET_SHA\`."
              if [[ "$CHANGESETS_OUTCOME" == "failure" || "$CHANGESETS_OUTCOME" == "cancelled" ]]; then
                echo "Changesets processing did not complete successfully; inspect the failed step above."
              elif [[ -n "$PULL_REQUEST_NUMBER" ]]; then
                echo "Created or updated release pull request #$PULL_REQUEST_NUMBER and dispatched its checks."
              else
                echo "No release pull request required an update."
              fi
            elif [[ "$CURRENT_REVISION" == "false" ]]; then
              echo "Skipped superseded revision \`$TARGET_SHA\`; current master is \`$ACTUAL_SHA\`."
              echo "A newer successful Check run owns release processing."
            else
              echo "The workflow could not determine whether \`$TARGET_SHA\` is current master."
              echo "Inspect the checkout and revision-selection steps above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
