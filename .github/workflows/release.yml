name: Release

on:
  workflow_run:
    workflows:
      - Check
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: write
  attestations: write
  contents: write
  id-token: write
  packages: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

concurrency:
  group: changesets-release-master
  cancel-in-progress: false

jobs:
  version:
    name: Update Version Packages pull request
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    if: >-
      ${{
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master') ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}

    steps:
      - name: Check out master
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Select the validated master revision
        id: revision
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          echo "actual=$actual" >> "$GITHUB_OUTPUT"
          if [[ "$actual" != "$TARGET_SHA" ]]; then
            echo "Validated revision $TARGET_SHA is no longer master ($actual); a newer run will handle it."
            echo "current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "current=true" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        if: ${{ steps.revision.outputs.current == 'true' }}
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Log in to GitHub Container Registry
        if: ${{ steps.revision.outputs.current == 'true' }}
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update signed Version Packages pull request
        id: changesets
        if: ${{ steps.revision.outputs.current == 'true' }}
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          branch: master
          commit: "chore(release): version packages"
          commitMode: github-api
          createGithubReleases: false
          prDraft: create
          title: "chore(release): version packages"
          version: nix run .#releasePrepare --
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CANDIDATE_PLAN: ${{ runner.temp }}/release-candidates.json
          RELEASE_REGISTRY_OWNER: ${{ github.repository_owner }}
          RELEASE_SBOM_DIRECTORY: ${{ runner.temp }}/release-sboms
          RELEASE_SOURCE_REVISION: ${{ env.TARGET_SHA }}

      - name: Resolve candidate attestation subjects
        id: candidates
        if: >-
          ${{
            steps.revision.outputs.current == 'true' &&
            steps.changesets.outputs.pullRequestNumber != ''
          }}
        shell: bash
        env:
          RELEASE_CANDIDATE_PLAN: ${{ runner.temp }}/release-candidates.json
        run: |
          set -euo pipefail
          jq -e '
            type == "array" and
            all(.[];
              (.app | type == "string") and
              (.repository | test("^ghcr\\.io/[a-z0-9-]+/[a-z0-9-]+$")) and
              (.digest | test("^sha256:[0-9a-f]{64}$")) and
              (.sbom | type == "string")
            )
          ' "$RELEASE_CANDIDATE_PLAN" >/dev/null

          emit_candidate() {
            local app="$1"
            local output_prefix="$2"
            local count
            local candidate

            count="$(jq --arg app "$app" '[.[] | select(.app == $app)] | length' "$RELEASE_CANDIDATE_PLAN")"
            if [[ "$count" == "0" ]]; then
              echo "${output_prefix}_present=false" >>"$GITHUB_OUTPUT"
              return 0
            fi
            if [[ "$count" != "1" ]]; then
              echo "Expected exactly one candidate for $app, found $count." >&2
              exit 1
            fi

            candidate="$(jq -c --arg app "$app" '.[] | select(.app == $app)' "$RELEASE_CANDIDATE_PLAN")"
            {
              echo "${output_prefix}_present=true"
              echo "${output_prefix}_repository=$(jq -r '.repository' <<<"$candidate")"
              echo "${output_prefix}_digest=$(jq -r '.digest' <<<"$candidate")"
              echo "${output_prefix}_sbom=$(jq -r '.sbom' <<<"$candidate")"
            } >>"$GITHUB_OUTPUT"
          }

          emit_candidate dotdev-web web
          emit_candidate dotdev-studio studio
          emit_candidate dotdev-labs labs

      - name: Attest dotdev-web provenance
        if: ${{ steps.candidates.outputs.web_present == 'true' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.candidates.outputs.web_repository }}
          subject-digest: ${{ steps.candidates.outputs.web_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest dotdev-web SBOM
        if: ${{ steps.candidates.outputs.web_present == 'true' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.candidates.outputs.web_repository }}
          subject-digest: ${{ steps.candidates.outputs.web_digest }}
          sbom-path: ${{ steps.candidates.outputs.web_sbom }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest dotdev-studio provenance
        if: ${{ steps.candidates.outputs.studio_present == 'true' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.candidates.outputs.studio_repository }}
          subject-digest: ${{ steps.candidates.outputs.studio_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest dotdev-studio SBOM
        if: ${{ steps.candidates.outputs.studio_present == 'true' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.candidates.outputs.studio_repository }}
          subject-digest: ${{ steps.candidates.outputs.studio_digest }}
          sbom-path: ${{ steps.candidates.outputs.studio_sbom }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest dotdev-labs provenance
        if: ${{ steps.candidates.outputs.labs_present == 'true' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.candidates.outputs.labs_repository }}
          subject-digest: ${{ steps.candidates.outputs.labs_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest dotdev-labs SBOM
        if: ${{ steps.candidates.outputs.labs_present == 'true' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ steps.candidates.outputs.labs_repository }}
          subject-digest: ${{ steps.candidates.outputs.labs_digest }}
          sbom-path: ${{ steps.candidates.outputs.labs_sbom }}
          push-to-registry: true
          create-storage-record: false

      - name: Verify signed candidate attestations
        if: >-
          ${{
            steps.revision.outputs.current == 'true' &&
            steps.changesets.outputs.pullRequestNumber != ''
          }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CANDIDATE_PLAN: ${{ runner.temp }}/release-candidates.json
        run: |
          set -euo pipefail
          signer_workflow="$GITHUB_REPOSITORY/.github/workflows/release.yml"
          while IFS=$'\t' read -r repository digest; do
            subject="oci://$repository@$digest"
            gh attestation verify "$subject" \
              --bundle-from-oci \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$TARGET_SHA" >/dev/null
            gh attestation verify "$subject" \
              --bundle-from-oci \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --source-digest "$TARGET_SHA" \
              --predicate-type https://spdx.dev/Document/v2.3 >/dev/null
          done < <(jq -r '.[] | [.repository, .digest] | @tsv' "$RELEASE_CANDIDATE_PLAN")

      - name: Run checks for the release pull request
        if: >-
          ${{
            steps.revision.outputs.current == 'true' &&
            steps.changesets.outputs.pullRequestNumber != ''
          }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          set -euo pipefail
          head_ref="$(gh pr view "$PULL_REQUEST_NUMBER" --json headRefName --jq '.headRefName')"
          gh workflow run ci.yml --ref "$head_ref"

      - name: Summarize the release decision
        if: ${{ always() }}
        shell: bash
        env:
          ACTUAL_SHA: ${{ steps.revision.outputs.actual }}
          CHANGESETS_OUTCOME: ${{ steps.changesets.outcome }}
          CURRENT_REVISION: ${{ steps.revision.outputs.current }}
          PULL_REQUEST_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          set -euo pipefail
          {
            echo "## Changesets release"
            echo
            if [[ "$CURRENT_REVISION" == "true" ]]; then
              echo "Validated current master revision \`$TARGET_SHA\`."
              if [[ "$CHANGESETS_OUTCOME" == "failure" || "$CHANGESETS_OUTCOME" == "cancelled" ]]; then
                echo "Changesets processing did not complete successfully; inspect the failed step above."
              elif [[ -n "$PULL_REQUEST_NUMBER" ]]; then
                echo "Created or updated release pull request #$PULL_REQUEST_NUMBER and dispatched its checks."
              else
                echo "No release pull request required an update."
              fi
            elif [[ "$CURRENT_REVISION" == "false" ]]; then
              echo "Skipped superseded revision \`$TARGET_SHA\`; current master is \`$ACTUAL_SHA\`."
              echo "A newer successful Check run owns release processing."
            else
              echo "The workflow could not determine whether \`$TARGET_SHA\` is current master."
              echo "Inspect the checkout and revision-selection steps above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
