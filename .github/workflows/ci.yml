name: Check

on:
  merge_group:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-changes:
    name: Detect app changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      dotdev: ${{ steps.apps.outputs.dotdev }}
      studio: ${{ steps.apps.outputs.studio }}
      labs: ${{ steps.apps.outputs.labs }}
      shared: ${{ steps.apps.outputs.shared }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect affected apps
        id: apps
        shell: bash
        run: |
          set -euo pipefail

          dotdev=false
          studio=false
          labs=false
          shared=false

          mark_all() {
            dotdev=true
            studio=true
            labs=true
          }

          event_name="${{ github.event_name }}"
          if [[ "$event_name" == "workflow_dispatch" || "$event_name" == "merge_group" ]]; then
            shared=true
            mark_all
          else
            if [[ "$event_name" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
            else
              base="${{ github.event.before }}"
              if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
                base="$(git rev-parse HEAD^)"
              fi
            fi

            while IFS= read -r path; do
              [[ -z "$path" ]] && continue

              case "$path" in
                apps/dotdev/**|nix/packages/dotdev.nix)
                  dotdev=true
                  ;;
                apps/studio/**|nix/packages/studio.nix)
                  studio=true
                  ;;
                apps/labs/**|nix/packages/labs.nix)
                  labs=true
                  ;;
                .github/workflows/ci.yml|flake.lock|flake.nix|package-lock.json|package.json|nix/hashes.nix|nix/overlay.nix|nix/lib/**|nix/packages/app.nix|nix/packages/default.nix|nix/packages/images.nix|nix/packages/node-modules.nix|packages/**)
                  shared=true
                  mark_all
                  ;;
              esac
            done < <(git diff --name-only "$base" HEAD)
          fi

          {
            echo "dotdev=$dotdev"
            echo "studio=$studio"
            echo "labs=$labs"
            echo "shared=$shared"
          } | tee -a "$GITHUB_OUTPUT"

  base-checks:
    name: Base checks
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8
      - name: Run base checks
        run: |
          nix build \
            .#checks.x86_64-linux.format \
            .#checks.x86_64-linux.dependency-policy \
            .#checks.x86_64-linux.lint \
            .#checks.x86_64-linux.helm \
            .#checks.x86_64-linux.gitops \
            .#checks.x86_64-linux.image-runtime \
            .#checks.x86_64-linux.infra-smoke \
            .#checks.x86_64-linux.runtime-smoke \
            .#checks.x86_64-linux.release-versioning \
            .#checks.x86_64-linux.security-boundaries \
            .#checks.x86_64-linux.typecheck-infra-native \
            .#checks.x86_64-linux.workflows

  dependency-security:
    name: Dependency security
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Reject moderate, high, and critical advisories
        run: nix run .#securityAudit

  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          build-mode: none
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: /language:javascript-typescript

  changeset-status:
    name: Changeset status
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.ref != 'changeset-release/master'
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Validate pending release intent
        run: nix run .#changeset -- status --since "${{ github.event.pull_request.base.sha }}"

  release-candidate-provenance:
    name: Release candidate provenance
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: >-
      ${{
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.head.ref == 'changeset-release/master'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/changeset-release/master'
        )
      }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Check out release candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve the release base revision
        id: release-base
        shell: bash
        env:
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="$PULL_REQUEST_BASE_SHA"
            if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              git fetch --no-tags origin "$base"
            fi
          else
            git fetch --no-tags origin master:refs/remotes/origin/master
            base="$(git merge-base HEAD origin/master)"
          fi
          git cat-file -e "$base^{commit}"
          echo "sha=$base" >> "$GITHUB_OUTPUT"
          echo "Release base revision: $base"

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify immutable release candidates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BASE_REVISION: ${{ steps.release-base.outputs.sha }}
          RELEASE_REGISTRY_OWNER: ${{ github.repository_owner }}
        run: >-
          nix run
          "github:$GITHUB_REPOSITORY/$RELEASE_BASE_REVISION#releaseVerifyCandidates"
          --

  typecheck-shared:
    name: Typecheck workspace
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs:
      - detect-changes
      - base-checks
      - dependency-security
    if: ${{ needs.detect-changes.outputs.shared == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Run workspace typecheck
        run: nix build .#checks.x86_64-linux.typecheck

  typecheck-dotdev:
    name: Typecheck dotdev-web
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs:
      - detect-changes
      - base-checks
    if: ${{ needs.detect-changes.outputs.shared != 'true' && needs.detect-changes.outputs.dotdev == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Run dotdev typecheck
        run: nix build .#checks.x86_64-linux.typecheck

  typecheck-studio:
    name: Typecheck dotdev-studio
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs:
      - detect-changes
      - base-checks
    if: ${{ needs.detect-changes.outputs.shared != 'true' && needs.detect-changes.outputs.studio == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Run studio typecheck
        run: nix build .#checks.x86_64-linux.typecheck

  typecheck-labs:
    name: Typecheck dotdev-labs
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs:
      - detect-changes
      - base-checks
    if: ${{ needs.detect-changes.outputs.shared != 'true' && needs.detect-changes.outputs.labs == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8

      - name: Run labs typecheck
        run: nix build .#checks.x86_64-linux.typecheck

  build-dotdev:
    name: Build dotdev-web image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs:
      - detect-changes
      - base-checks
    if: ${{ needs.detect-changes.outputs.dotdev == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8
      - name: Build dotdev image
        run: nix build .#dotdevImage --out-link result-dotdev
      - name: Smoke-test hardened dotdev container
        run: |
          docker load < result-dotdev
          bash nix/lib/smoke-oci-image.sh dotdev-web:latest 3020 /about

  build-studio:
    name: Build dotdev-studio image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs:
      - detect-changes
      - base-checks
    if: ${{ needs.detect-changes.outputs.studio == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8
      - name: Build studio image
        run: nix build .#studioImage --out-link result-studio
      - name: Smoke-test hardened studio container
        run: |
          docker load < result-studio
          bash nix/lib/smoke-oci-image.sh dotdev-studio:latest 3021

  build-labs:
    name: Build dotdev-labs image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs:
      - detect-changes
      - base-checks
    if: ${{ needs.detect-changes.outputs.labs == 'true' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8
      - name: Build labs image
        run: nix build .#labsImage --out-link result-labs
      - name: Smoke-test hardened labs container
        run: |
          docker load < result-labs
          bash nix/lib/smoke-oci-image.sh dotdev-labs:latest 3022

  required:
    name: Required checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - detect-changes
      - base-checks
      - dependency-security
      - codeql
      - changeset-status
      - release-candidate-provenance
      - typecheck-shared
      - typecheck-dotdev
      - typecheck-studio
      - typecheck-labs
      - build-dotdev
      - build-studio
      - build-labs

    steps:
      - name: Require every applicable check
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          set -euo pipefail
          if [[ " $RESULTS " == *" failure "* || " $RESULTS " == *" cancelled "* ]]; then
            echo "One or more required jobs failed or were cancelled: $RESULTS" >&2
            exit 1
          fi
          echo "All applicable checks completed successfully: $RESULTS"
