name: Publish Artifacts

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-images:
    name: Publish Images (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: dotdev-web
            dockerfile: apps/dotdev/Dockerfile
          - name: dotdev-studio
            dockerfile: apps/studio/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.target.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.target.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.target.name }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target.name }}

  publish-charts:
    name: Publish Charts (${{ matrix.chart.name }})
    runs-on: ubuntu-latest
    needs: publish-images
    strategy:
      fail-fast: false
      matrix:
        chart:
          - name: dotdev-web
            path: ./helm/dotdev-web
            release: dotdev-web
          - name: dotdev-studio
            path: ./helm/dotdev-studio
            release: dotdev-studio
    env:
      CHART_VERSION: 0.1.${{ github.run_number }}-r${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ${{ matrix.chart.path }}

      - name: Render chart
        run: |
          helm template ${{ matrix.chart.release }} ${{ matrix.chart.path }} \
            --namespace dsqr \
            -f ${{ matrix.chart.path }}/values-prod.yaml

      - name: Log in to GitHub Container Registry for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Package chart
        run: |
          helm package ${{ matrix.chart.path }} \
            --version "${CHART_VERSION}" \
            --app-version "sha-${{ github.sha }}"

      - name: Push chart to GHCR
        run: helm push ${{ matrix.chart.name }}-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
