global:
  domain: argocd.dsqr.dev

configs:
  cm:
    timeout.reconciliation: 120s
    timeout.reconciliation.jitter: 60s
  params:
    server.insecure: "true"

crds:
  install: true
  keep: true

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd.dsqr.dev
    path: /
    pathType: Prefix
    tls: false
